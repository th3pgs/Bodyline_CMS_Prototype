<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodyline CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="bg-white text-slate-800 antialiased h-screen flex flex-col font-sans relative">

    <header id="main-header" class="p-4 flex justify-between items-center text-sm font-medium text-slate-600 border-b border-slate-100">
        <div class="flex gap-6">
            <button onclick="showAdminAuth()" class="hover:text-blue-600 font-bold flex items-center gap-2"><i class="ph ph-shield-check text-lg"></i> Admin Login</button>
        </div>
        <div class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full font-bold shadow-inner text-blue-800">
            <i class="ph ph-calendar-blank"></i> <span id="current-date-display"></span>
        </div>
    </header>

    <main id="view-home" class="flex-1 flex flex-col items-center justify-center p-4 relative fade-in">
        <div class="mb-8 text-center">
            <h1 class="text-6xl font-bold tracking-tighter text-slate-800 flex items-center justify-center gap-3">
                <i class="ph-fill ph-scissors text-blue-600"></i> CMS
            </h1>
            <p class="text-slate-500 mt-2 font-medium tracking-widest uppercase text-xs">Bodyline Pattern Tracker</p>
        </div>

        <div class="w-full max-w-2xl relative z-10">
            <div class="relative flex items-center w-full h-14 rounded-full google-shadow bg-white hover:bg-white focus-within:bg-white focus-within:shadow-md transition-all">
                <i class="ph ph-magnifying-glass absolute left-5 text-xl text-slate-400"></i>
                <input type="text" id="searchInput" autocomplete="off" placeholder="Search patterns by Name or ID..." class="w-full h-full bg-transparent pl-14 pr-12 outline-none text-lg text-slate-700">
                <button onclick="clearSearch()" id="clearBtn" class="absolute right-4 text-slate-400 hover:text-slate-600 hidden"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div id="autocomplete-dropdown" class="absolute w-full bg-white mt-1 rounded-2xl shadow-xl border border-slate-100 hidden flex flex-col py-2 max-h-64 overflow-y-auto z-50"></div>
        </div>

        <button onclick="openQuickScan()" class="absolute bottom-10 right-10 bg-blue-600 text-white h-16 w-16 rounded-full shadow-2xl hover:bg-blue-700 hover:scale-105 transition-all flex items-center justify-center group">
            <i class="ph ph-qr-code text-3xl group-hover:animate-pulse"></i>
        </button>
    </main>

    <main id="view-asset" class="hidden flex-1 flex flex-col items-center justify-center p-4 bg-slate-50 fade-in relative">
        <button onclick="goHome()" class="absolute top-8 left-8 text-slate-500 hover:text-slate-800 flex items-center gap-2 font-bold"><i class="ph ph-arrow-left text-xl"></i> Back</button>
        <div id="asset-card-container" class="w-full max-w-xl"></div>
    </main>

    <main id="view-admin" class="hidden flex-1 flex flex-col p-8 bg-slate-50 fade-in overflow-y-auto relative">
        <button onclick="promptLogout()" class="absolute top-8 right-8 text-red-600 hover:text-red-800 flex items-center gap-2 font-bold bg-red-50 px-4 py-2 rounded-xl border border-red-200 shadow-sm"><i class="ph ph-sign-out text-xl"></i> Log Out Admin</button>
        <h2 class="text-3xl font-bold text-slate-800 mb-8 mt-2"><i class="ph ph-shield-check text-blue-600"></i> Administration Console</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl w-full mx-auto">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-4 border-b pb-2">Register Asset</h3>
                <input type="text" id="reg-name" placeholder="Pattern Name (e.g. Nike Pro M)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-3 outline-none focus:border-blue-500 font-medium">
                <input type="text" id="reg-loc" placeholder="Location (e.g. Rack B-05)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-6 outline-none focus:border-blue-500 font-medium">
                <button onclick="registerAsset()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all">Generate Pattern QR</button>
                <div id="admin-qr-output-pattern" class="mt-6 hidden flex flex-col items-center fade-in">
                    <div id="print-zone-pattern" class="p-4 bg-white border-2 border-slate-800 rounded-2xl inline-block text-center mb-4">
                        <div id="qrcode-image-pattern" class="mx-auto flex justify-center"></div>
                        <p id="qr-text-pattern" class="mt-3 font-mono font-bold tracking-widest text-slate-800"></p>
                    </div>
                    <button onclick="printQR('print-zone-pattern')" class="bg-blue-100 text-blue-700 font-bold px-6 py-2 rounded-full hover:bg-blue-200 flex gap-2"><i class="ph ph-printer text-lg"></i> Print Label</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-4 border-b pb-2">Register Operator</h3>
                <input type="text" id="reg-emp-name" placeholder="Operator Name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-3 outline-none focus:border-blue-500 font-medium">
                <select id="reg-emp-role" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-6 outline-none font-medium text-slate-700">
                    <option value="Block Handler">Block Handler</option><option value="Machine Operator">Machine Operator</option><option value="Cutting Supervisor">Cutting Supervisor</option>
                </select>
                <button onclick="registerOperator()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all">Generate Badge QR</button>
                <div id="admin-qr-output-emp" class="mt-6 hidden flex flex-col items-center fade-in">
                    <div id="print-zone-emp" class="p-4 bg-blue-50 border-2 border-blue-600 rounded-2xl inline-block text-center mb-4">
                        <div id="qrcode-image-emp" class="mx-auto flex justify-center"></div>
                        <p id="qr-text-emp" class="mt-3 font-mono font-bold text-blue-900 tracking-widest"></p>
                    </div>
                    <button onclick="printQR('print-zone-emp')" class="bg-blue-100 text-blue-700 font-bold px-6 py-2 rounded-full hover:bg-blue-200 flex gap-2"><i class="ph ph-printer text-lg"></i> Print Badge</button>
                </div>
            </div>
        </div>
    </main>

    <div id="admin-auth-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center transform scale-95 transition-transform" id="admin-auth-content">
            <i class="ph-fill ph-shield-warning text-5xl text-blue-600 mb-2"></i>
            <h3 class="font-bold text-xl mb-2">Admin Authorization</h3>
            <p class="text-sm text-slate-500 mb-6">Simulation Mode: Bypassing credentials for demonstration.</p>
            <div class="flex gap-3">
                <button onclick="closeAdminAuth()" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3 rounded-xl hover:bg-slate-200">Cancel</button>
                <button onclick="executeAdminLogin()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">Authorize (OK)</button>
            </div>
        </div>
    </div>

    <div id="logout-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 text-center transform scale-95 transition-transform" id="logout-content">
            <i class="ph-fill ph-sign-out text-5xl text-red-600 mb-4"></i>
            <h3 class="font-bold text-2xl mb-2">Log Out Admin?</h3>
            <p class="text-sm text-slate-500 mb-8 font-medium">You will be returned to the main tracking interface.</p>
            <div class="flex flex-col gap-3">
                <button onclick="executeLogout()" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl hover:bg-red-700 shadow-lg shadow-red-200">Yes, Log Out</button>
                <button onclick="closeLogoutModal()" class="w-full bg-slate-100 text-slate-700 font-bold py-4 rounded-xl hover:bg-slate-200">Cancel</button>
            </div>
        </div>
    </div>

    <div id="verify-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform" id="verify-modal-content">
            <div class="bg-slate-900 p-4 text-white flex justify-between items-center">
                <h3 id="modal-title" class="font-bold tracking-wide">Strict Verification</h3>
                <button onclick="closeVerifyModal()" class="text-slate-400 hover:text-white bg-slate-800 p-1.5 rounded-lg transition-colors"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="p-6 flex flex-col h-full max-h-[85vh]">
                <div class="flex items-center justify-between mb-4 text-[10px] font-bold uppercase tracking-widest text-slate-400 border-b border-slate-100 pb-4 shrink-0">
                    <div id="step-1-indicator" class="flex items-center gap-1"><i class="ph ph-circle text-lg"></i> Pattern</div>
                    <div class="flex-1 border-t border-dashed border-slate-200 mx-2"></div>
                    <div id="step-2-indicator" class="flex items-center gap-1"><i class="ph ph-circle text-lg"></i> Operator</div>
                </div>
                <div id="modal-dynamic-area" class="flex-1 flex flex-col justify-center items-center overflow-hidden"></div>
            </div>
        </div>
    </div>

    <div id="print-area" class="hidden"></div>
</body>
</html>
